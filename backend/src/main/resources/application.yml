spring:
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 2GB
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:postgresql://localhost:5432/minicrm
    username: minicrm
    password: minicrm
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
  main:
    lazy-initialization: true
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080
  tomcat:
    threads:
      max: 20
      min-spare: 2

groq:
  api-key: ${GROQ_API_KEY:}

smb:
  host: ${SMB_HOST:100.120.87.43}
  share: ${SMB_SHARE:Storage}
  base-path: ${SMB_BASE_PATH:hango}
  username: ${SMB_USERNAME:}
  password: ${SMB_PASSWORD:}
